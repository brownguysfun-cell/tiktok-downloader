    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',-apple-system,sans-serif;background:#0a0a0f;color:#fff;min-height:100vh;min-height:-webkit-fill-available}

        /* Hero */
        .hero{width:100%;padding:2.2rem 1.5rem 1rem;text-align:center;background:linear-gradient(180deg,rgba(255,0,80,.08) 0%,transparent 100%)}
        .hero h1{font-size:1.6rem;font-weight:900;letter-spacing:-.5px}
        .hero h1 span{background:linear-gradient(90deg,#ff0050,#00f2ea);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .hero p{color:#666;font-size:.82rem;margin-top:.4rem}

        /* Lang selector */
        .lang-bar{display:flex;justify-content:center;padding:.6rem 1rem 0;gap:.3rem;flex-wrap:wrap}
        .lang-btn{background:transparent;border:1px solid #222;color:#555;font-size:.68rem;padding:.3rem .55rem;border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
        .lang-btn:hover{border-color:#444;color:#aaa}
        .lang-btn.active{background:rgba(255,0,80,.12);border-color:#ff0050;color:#ff0050;font-weight:600}

        /* Main */
        .main{max-width:560px;margin:0 auto;padding:0 1.5rem 3rem}

        /* Input */
        .input-box{margin-top:1.2rem}
        .input-box label{display:block;font-size:.78rem;color:#666;margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
        textarea{width:100%;height:130px;background:#14141e;border:2px solid #222233;border-radius:14px;padding:1rem;color:#fff;font-family:'Inter',sans-serif;font-size:.88rem;line-height:1.6;resize:vertical;transition:border-color .3s}
        textarea:focus{outline:none;border-color:#ff0050}
        textarea::placeholder{color:#444}
        .url-count{text-align:right;font-size:.72rem;color:#444;margin-top:.4rem;transition:color .2s}
        .url-count.active{color:#00f2ea}

        /* Buttons */
        .actions{display:flex;gap:.6rem;margin-top:1rem}
        .btn{flex:1;padding:.9rem;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:transform .15s,opacity .15s}
        .btn:active:not(:disabled){transform:scale(.97)}
        .btn:disabled{opacity:.35;cursor:not-allowed}
        .btn-primary{background:linear-gradient(135deg,#ff0050,#e6004a);color:#fff;flex:3}
        .btn-secondary{background:#1e1e2e;color:#aaa;flex:1;font-size:1.1rem}

        /* Loader */
        .loader-wrap{margin-top:1.5rem;display:none;text-align:center}
        .loader-wrap p{color:#666;font-size:.82rem;margin-bottom:.6rem}
        .loader-wrap p b{color:#00f2ea}
        .loader-bar{height:3px;background:#1a1a24;border-radius:3px;overflow:hidden}
        .loader-bar::after{content:'';display:block;height:100%;width:35%;background:linear-gradient(90deg,#ff0050,#00f2ea);border-radius:3px;animation:slide 1.2s infinite ease-in-out}
        @keyframes slide{0%{transform:translateX(-110%)}100%{transform:translateX(350%)}}

        /* Messages */
        .msg{padding:.9rem 1rem;border-radius:12px;margin-top:1rem;font-size:.82rem;line-height:1.5;display:none}
        .msg-error{color:#ff6b6b;background:rgba(255,60,60,.08);border:1px solid rgba(255,60,60,.2)}
        .msg-warn{color:#ffaa00;background:rgba(255,170,0,.08);border:1px solid rgba(255,170,0,.2)}

        /* Results */
        .results{margin-top:1.5rem;display:none}
        .results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
        .results-header h2{font-size:.95rem;font-weight:700}
        .results-header .count{font-size:.75rem;padding:.25rem .7rem;border-radius:20px;background:rgba(0,200,83,.12);color:#00c853;font-weight:600}

        .video-card{background:#13131b;border:1px solid #1e1e2e;border-radius:14px;overflow:hidden;margin-bottom:.8rem;display:flex;align-items:stretch}
        .video-card .thumb{width:90px;min-height:90px;object-fit:cover;background:#1a1a24;flex-shrink:0}
        .video-card .info{flex:1;padding:.8rem 1rem;display:flex;flex-direction:column;justify-content:center;gap:.3rem;min-width:0}
        .video-card .info .title{font-size:.82rem;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .video-card .info .meta{font-size:.7rem;color:#555;display:flex;gap:.6rem;flex-wrap:wrap}
        .badge-quality{font-size:.65rem;font-weight:700;padding:.15rem .45rem;border-radius:4px;background:rgba(0,242,234,.12);color:#00f2ea;letter-spacing:.3px}
        .video-card .dl-btn{display:flex;align-items:center;justify-content:center;width:56px;background:rgba(0,200,83,.1);border:none;cursor:pointer;flex-shrink:0;transition:background .2s;text-decoration:none;font-size:1.3rem}
        .video-card .dl-btn:active{background:rgba(0,200,83,.25)}

        /* Tip */
        .tip{margin-top:1.5rem;padding:1rem;border-radius:12px;background:rgba(0,242,234,.04);border:1px solid rgba(0,242,234,.1);font-size:.75rem;color:#556;line-height:1.6;text-align:center}
        .tip strong{color:#888}
    </style>
</head>

        warn_failed: '⚠ தோல்வியுற்ற இணைப்புகள்:',
        err_NO_URLS: 'குறைந்தது ஒரு TikTok இணைப்பை ஒட்டவும்.',
        err_NO_VIDEOS: 'எந்த வீடியோவையும் பதிவிறக்க இயலவில்லை.',
        err_INVALID_URL: 'தவறான TikTok இணைப்பு',
        err_DOWNLOAD_FAILED: 'பதிவிறக்கம் தோல்வி',
        err_FILE_NOT_FOUND: 'பதிவிறக்கத்திற்குப் பிறகு கோப்பு கிடைக்கவில்லை',
        err_unknown: 'தெரியாத பிழை ஏற்பட்டது.',
    },
};

let currentLang = localStorage.getItem('lang') || 'en';

function t(key) {
    return (LANGS[currentLang] && LANGS[currentLang][key]) || LANGS.en[key] || key;
}

function applyLang(lang) {
    currentLang = lang;
    localStorage.setItem('lang', lang);

    // Update all data-i18n elements
    document.querySelectorAll('[data-i18n]').forEach(el => {
        el.innerHTML = t(el.dataset.i18n);
    });

    // Update placeholders
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        el.placeholder = t(el.dataset.i18nPlaceholder);
    });

    // Update tip
    document.getElementById('tip').innerHTML = t('tip');

    // Update active button
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
    });

    // RTL for Arabic
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
}

// Build language bar
const langBar = document.getElementById('lang-bar');
Object.keys(LANGS).forEach(code => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn';
    btn.dataset.lang = code;
    btn.textContent = LANGS[code].name;
    btn.addEventListener('click', () => applyLang(code));
    langBar.appendChild(btn);
});

// Apply saved or default language
applyLang(currentLang);


/* ────────────────────────────────────────────────
   App logic
   ──────────────────────────────────────────────── */
const urlsEl    = document.getElementById('urls');
const urlNumEl  = document.getElementById('url-num');
const btnDl     = document.getElementById('btn-dl');
const btnPaste  = document.getElementById('btn-paste');
const loaderEl  = document.getElementById('loader');
const errorEl   = document.getElementById('error');
const warnEl    = document.getElementById('warn');
const resultsEl = document.getElementById('results');
const listEl    = document.getElementById('video-list');
const countBadge= document.getElementById('results-count');

function getUrls() {
    return urlsEl.value.split('\n').map(u => u.trim()).filter(Boolean);
}

urlsEl.addEventListener('input', () => {
    urlNumEl.textContent = getUrls().length;
    document.getElementById('url-count').classList.toggle('active', getUrls().length > 0);
});

btnPaste.addEventListener('click', async () => {
    try {
        const text = await navigator.clipboard.readText();
        urlsEl.value = text;
        urlsEl.dispatchEvent(new Event('input'));
    } catch {}
});

btnDl.addEventListener('click', async () => {
    const urls = getUrls();
    if (!urls.length) return;

    btnDl.disabled = true;
    btnDl.textContent = t('btn_processing');
    loaderEl.style.display = 'block';
    errorEl.style.display  = 'none';
    warnEl.style.display   = 'none';
    resultsEl.style.display = 'none';
    listEl.innerHTML = '';

    try {
        const res = await fetch('/download', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ urls: urls.join('\n') })
        });

        const data = await res.json();

        if (!res.ok) {
            throw new Error(t('err_' + data.error) || t('err_unknown'));
        }

        if (data.failed && data.failed.length) {
            warnEl.innerHTML = '<strong>' + t('warn_failed') + '</strong><br>' +
                data.failed.map(f => '• ' + escapeHtml(f.url)).join('<br>');
            warnEl.style.display = 'block';
        }

        if (data.videos && data.videos.length) {
            countBadge.textContent = data.videos.length + ' ' + t('videos_count');

            data.videos.forEach(v => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    ${v.thumbnail
                        ? `<img class="thumb" src="${v.thumbnail}" alt="">`
                        : `<div class="thumb"></div>`}
                    <div class="info">
                        <div class="title">${escapeHtml(v.title)}</div>
                        <div class="meta">
                            ${v.author ? `<span>@${escapeHtml(v.author)}</span>` : ''}
                            <span>${v.size}</span>
                            <span class="badge-quality">${v.quality}</span>
                        </div>
                    </div>
                    <a class="dl-btn" href="${v.download_url}" download="${v.filename}" title="Download">⬇</a>
                `;
                listEl.appendChild(card);
            });

            resultsEl.style.display = 'block';
        }

    } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
    } finally {
        btnDl.disabled = false;
        btnDl.textContent = t('btn_download');
        loaderEl.style.display = 'none';
    }
});

function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}
</script>
</body>
</html>
